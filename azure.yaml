# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: azure-podcast-generator

infra:
  provider: bicep
  path: ./infra

services:
  api:
    project: ./src/api
    host: aks
    language: ts
    k8s:
      namespace: azure-podcast-generator
      deployment:
        name: api
      service:
        name: api
      ingress:
        name: api
        relativePath: api
  web:
    project: ./src/web
    host: aks
    language: ts
    k8s:
      namespace: azure-podcast-generator
      deployment:
        name: web
      service:
        name: web
      ingress:
        name: web
hooks:
  preprovision:
    posix:
      shell: sh
      run: sh ./infra/scripts/preprovision.sh
      continueOnError: false
    windows:
      shell: pwsh
      run: ./infra/scripts/preprovision.ps1
      continueOnError: false
  postprovision:
    posix:
      shell: sh
      run: sh ./infra/scripts/postprovision.sh
      continueOnError: false
    windows:
      shell: pwsh
      run: ./infra/scripts/postprovision.ps1
      continueOnError: false
  predeploy:
    posix:
      shell: sh
      run: sh ./infra/scripts/predeploy.sh
      continueOnError: false
    windows:
      shell: pwsh
      run: ./infra/scripts/predeploy.ps1
      continueOnError: false
