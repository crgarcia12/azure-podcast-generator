# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: azure-podcast-generator

infra:
  provider: bicep
  path: ./infra

services:
  api:
    project: ./src/api
    host: aks
    language: ts
    k8s:
      deploymentPath: ./manifests-generated
      namespace: azure-podcast-generator
      deployment:
        name: api
      service:
        name: api
      ingress:
        name: web
        relativePath: api
    hooks:
      predeploy:
        posix:
          shell: sh
          run: bash ../../infra/scripts/predeploy.sh
          continueOnError: false
        windows:
          shell: pwsh
          run: ../../infra/scripts/predeploy.ps1
          continueOnError: false
  devbox:
    project: ./src/devbox
    host: aks
    language: js
    k8s:
      deploymentPath: ./manifests-generated
      namespace: azure-podcast-generator
      deployment:
        name: devbox
    hooks:
      predeploy:
        posix:
          shell: sh
          run: bash ../../infra/scripts/predeploy.sh
          continueOnError: false
        windows:
          shell: pwsh
          run: ../../infra/scripts/predeploy.ps1
          continueOnError: false
  web:
    project: ./src/web
    host: aks
    language: ts
    k8s:
      deploymentPath: ./manifests-generated
      namespace: azure-podcast-generator
      deployment:
        name: web
      service:
        name: web
      ingress:
        name: web
    hooks:
      predeploy:
        posix:
          shell: sh
          run: bash ../../infra/scripts/predeploy.sh
          continueOnError: false
        windows:
          shell: pwsh
          run: ../../infra/scripts/predeploy.ps1
          continueOnError: false
hooks:
  postprovision:
    posix:
      shell: sh
      run: bash ./infra/scripts/postprovision.sh
      continueOnError: false
    windows:
      shell: pwsh
      run: ./infra/scripts/postprovision.ps1
      continueOnError: false
