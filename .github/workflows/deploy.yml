name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    environment: production
    outputs:
      api_url: ${{ steps.capture_outputs.outputs.api_url }}
      web_url: ${{ steps.capture_outputs.outputs.web_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure CLI
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" `
            --federated-credential-provider "github" `
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
        shell: pwsh

      - name: Ensure azd environment
        shell: bash
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'crgar-podcast-prod' }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'westus3' }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'crgar-podcast-rg' }}
          CONTAINER_APPS_ENVIRONMENT_NAME: ${{ vars.CONTAINER_APPS_ENVIRONMENT_NAME || 'crgar-podcast-acae' }}
          CONTAINER_REGISTRY_NAME: ${{ vars.CONTAINER_REGISTRY_NAME || 'crgarpodcastacr' }}
          WEB_CONTAINER_APP_NAME: ${{ vars.WEB_CONTAINER_APP_NAME || 'crgar-podcast-web' }}
          API_CONTAINER_APP_NAME: ${{ vars.API_CONTAINER_APP_NAME || 'crgar-podcast-api' }}
          LOG_ANALYTICS_WORKSPACE_NAME: ${{ vars.LOG_ANALYTICS_WORKSPACE_NAME || 'crgar-podcast-law' }}
          APPLICATION_INSIGHTS_NAME: ${{ vars.APPLICATION_INSIGHTS_NAME || 'crgar-podcast-appi' }}
          API_IDENTITY_NAME: ${{ vars.API_IDENTITY_NAME || 'crgar-podcast-api-mi' }}
          WEB_IDENTITY_NAME: ${{ vars.WEB_IDENTITY_NAME || 'crgar-podcast-web-mi' }}
        run: |
          if ! azd env select "${AZURE_ENV_NAME}" >/dev/null 2>&1; then
            azd env new "${AZURE_ENV_NAME}" --no-prompt
          fi

          azd env set AZURE_LOCATION "${AZURE_LOCATION}"
          azd env set AZURE_SUBSCRIPTION_ID "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          azd env set AZURE_RESOURCE_GROUP "${AZURE_RESOURCE_GROUP}"
          azd env set CONTAINER_APPS_ENVIRONMENT_NAME "${CONTAINER_APPS_ENVIRONMENT_NAME}"
          azd env set CONTAINER_REGISTRY_NAME "${CONTAINER_REGISTRY_NAME}"
          azd env set WEB_CONTAINER_APP_NAME "${WEB_CONTAINER_APP_NAME}"
          azd env set API_CONTAINER_APP_NAME "${API_CONTAINER_APP_NAME}"
          azd env set LOG_ANALYTICS_WORKSPACE_NAME "${LOG_ANALYTICS_WORKSPACE_NAME}"
          azd env set APPLICATION_INSIGHTS_NAME "${APPLICATION_INSIGHTS_NAME}"
          azd env set API_IDENTITY_NAME "${API_IDENTITY_NAME}"
          azd env set WEB_IDENTITY_NAME "${WEB_IDENTITY_NAME}"

      - name: Provision infrastructure
        run: azd provision --no-prompt
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'crgar-podcast-prod' }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'westus3' }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy application
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'crgar-podcast-prod' }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'westus3' }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Grant API identity Azure AI access
        if: ${{ vars.AZURE_OPENAI_RESOURCE_ID != '' && vars.AZURE_SPEECH_RESOURCE_ID != '' }}
        shell: bash
        run: |
          resource_group="$(azd env get-value AZURE_RESOURCE_GROUP)"
          api_app_name="$(azd env get-value SERVICE_API_NAME)"
          identity_id="$(az containerapp show --resource-group "${resource_group}" --name "${api_app_name}" --query "keys(identity.userAssignedIdentities)[0]" -o tsv)"
          principal_id="$(az identity show --ids "${identity_id}" --query principalId -o tsv)"

          az role assignment create \
            --assignee-object-id "${principal_id}" \
            --assignee-principal-type ServicePrincipal \
            --scope "${{ vars.AZURE_OPENAI_RESOURCE_ID }}" \
            --role "Cognitive Services OpenAI User" \
            --only-show-errors >/dev/null 2>&1 || true

          az role assignment create \
            --assignee-object-id "${principal_id}" \
            --assignee-principal-type ServicePrincipal \
            --scope "${{ vars.AZURE_SPEECH_RESOURCE_ID }}" \
            --role "Cognitive Services Speech User" \
            --only-show-errors >/dev/null 2>&1 || true

      - name: Configure API container app
        run: bash ./infra/scripts/configure-api-containerapp.sh
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'crgar-podcast-prod' }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS || '' }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT || '' }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ vars.AZURE_OPENAI_DEPLOYMENT_NAME || '' }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION || '2024-10-21' }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ vars.AZURE_SPEECH_REGION || 'westus3' }}
          AZURE_SPEECH_RESOURCE_ID: ${{ vars.AZURE_SPEECH_RESOURCE_ID || '' }}
          PODCAST_HOST_VOICE: ${{ vars.PODCAST_HOST_VOICE || 'en-US-JennyNeural' }}
          PODCAST_GUEST_VOICE: ${{ vars.PODCAST_GUEST_VOICE || 'en-US-GuyNeural' }}
          SEED_ADMIN_USERNAME: ${{ vars.E2E_ADMIN_USERNAME || 'podcast-admin' }}
          SEED_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Capture deployment outputs
        id: capture_outputs
        shell: bash
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'crgar-podcast-rg' }}
          WEB_CONTAINER_APP_NAME: ${{ vars.WEB_CONTAINER_APP_NAME || 'crgar-podcast-web' }}
          API_CONTAINER_APP_NAME: ${{ vars.API_CONTAINER_APP_NAME || 'crgar-podcast-api' }}
        run: |
          read_env_value() {
            local key="$1"
            local line

            line="$(azd env get-values | grep -m1 "^${key}=" || true)"
            if [[ -n "${line}" ]]; then
              echo "${line#*=}" | sed -e 's/^"//' -e 's/"$//'
            fi
          }

          resolve_container_app_url() {
            local app_name="$1"
            local fqdn

            if [[ -z "${app_name}" ]]; then
              return 0
            fi

            fqdn="$(az containerapp show \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --name "${app_name}" \
              --query "properties.configuration.ingress.fqdn" \
              -o tsv 2>/dev/null || true)"

            if [[ -n "${fqdn}" ]]; then
              echo "https://${fqdn}"
            fi
          }

          web_url="$(read_env_value SERVICE_WEB_ENDPOINT_URL)"
          if [[ -z "${web_url}" ]]; then
            web_url="$(read_env_value REACT_APP_WEB_BASE_URL)"
          fi
          if [[ -z "${web_url}" ]]; then
            web_url="$(resolve_container_app_url "${WEB_CONTAINER_APP_NAME}")"
          fi

          api_url="$(read_env_value SERVICE_API_ENDPOINT_URL)"
          if [[ -z "${api_url}" ]]; then
            api_url="$(read_env_value API_BASE_URL)"
          fi
          if [[ -z "${api_url}" ]]; then
            api_url="$(resolve_container_app_url "${API_CONTAINER_APP_NAME}")"
          fi

          if [[ -z "${web_url}" || -z "${api_url}" ]]; then
            echo "Unable to resolve deployment outputs." >&2
            azd env get-values || true
            exit 1
          fi

          echo "web_url=${web_url}" >> "${GITHUB_OUTPUT}"
          echo "api_url=${api_url}" >> "${GITHUB_OUTPUT}"

  smoke-test:
    name: Smoke and live e2e
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run health checks
        run: |
          for i in {1..30}; do
            if curl -fsS "${{ needs.deploy.outputs.web_url }}/" > /dev/null \
              && curl -fsS "${{ needs.deploy.outputs.web_url }}/api/health" > /dev/null \
              && curl -fsS "${{ needs.deploy.outputs.api_url }}/health" > /dev/null; then
              exit 0
            fi

            sleep 10
          done

          curl -fsS "${{ needs.deploy.outputs.web_url }}/" > /dev/null
          curl -fsS "${{ needs.deploy.outputs.web_url }}/api/health" > /dev/null
          curl -fsS "${{ needs.deploy.outputs.api_url }}/health" > /dev/null

      - name: Run smoke tests
        run: npx playwright test --grep @smoke --config=e2e/playwright.config.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.web_url }}
          E2E_ADMIN_USERNAME: ${{ vars.E2E_ADMIN_USERNAME || 'podcast-admin' }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Run full live e2e suite
        run: npx playwright test --config=e2e/playwright.config.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.web_url }}
          E2E_ADMIN_USERNAME: ${{ vars.E2E_ADMIN_USERNAME || 'podcast-admin' }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 30
