name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # These are identifiers, not secrets. Security is provided by the OIDC
  # federated credential trust between this repo and the Azure AD app.
  AZURE_CLIENT_ID: "03c67cc0-a116-4474-b4ad-4da80cf78a3a"
  AZURE_TENANT_ID: "f75dc6d8-f0ea-4a54-9d3c-622e4aef8eb3"
  AZURE_SUBSCRIPTION_ID: "ac866176-3fcf-43c6-817a-6309be256398"
  AZURE_ENV_NAME: "crgar-podcast-prod"
  AZURE_LOCATION: "westus3"
  AZURE_RESOURCE_GROUP: "crgar-podcast-rg"
  CONTAINER_APPS_ENVIRONMENT_NAME: "crgar-podcast-acae"
  CONTAINER_REGISTRY_NAME: "crgarpodcastacr"
  WEB_CONTAINER_APP_NAME: "crgar-podcast-web"
  API_CONTAINER_APP_NAME: "crgar-podcast-api"
  LOG_ANALYTICS_WORKSPACE_NAME: "crgar-podcast-law"
  APPLICATION_INSIGHTS_NAME: "crgar-podcast-appi"
  API_IDENTITY_NAME: "crgar-podcast-api-mi"
  WEB_IDENTITY_NAME: "crgar-podcast-web-mi"

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.capture_outputs.outputs.api_url }}
      web_url: ${{ steps.capture_outputs.outputs.web_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure CLI (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in with Azure Developer CLI (Federated Credentials)
        run: |
          azd auth login `
            --client-id "${{ env.AZURE_CLIENT_ID }}" `
            --federated-credential-provider "github" `
            --tenant-id "${{ env.AZURE_TENANT_ID }}"
        shell: pwsh

      - name: Ensure azd environment
        shell: bash
        run: |
          if ! azd env select "${AZURE_ENV_NAME}" >/dev/null 2>&1; then
            azd env new "${AZURE_ENV_NAME}" --no-prompt
          fi

          azd env set AZURE_LOCATION "${AZURE_LOCATION}"
          azd env set AZURE_SUBSCRIPTION_ID "${AZURE_SUBSCRIPTION_ID}"
          azd env set AZURE_RESOURCE_GROUP "${AZURE_RESOURCE_GROUP}"
          azd env set CONTAINER_APPS_ENVIRONMENT_NAME "${CONTAINER_APPS_ENVIRONMENT_NAME}"
          azd env set CONTAINER_REGISTRY_NAME "${CONTAINER_REGISTRY_NAME}"
          azd env set WEB_CONTAINER_APP_NAME "${WEB_CONTAINER_APP_NAME}"
          azd env set API_CONTAINER_APP_NAME "${API_CONTAINER_APP_NAME}"
          azd env set LOG_ANALYTICS_WORKSPACE_NAME "${LOG_ANALYTICS_WORKSPACE_NAME}"
          azd env set APPLICATION_INSIGHTS_NAME "${APPLICATION_INSIGHTS_NAME}"
          azd env set API_IDENTITY_NAME "${API_IDENTITY_NAME}"
          azd env set WEB_IDENTITY_NAME "${WEB_IDENTITY_NAME}"

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Deploy application
        run: azd deploy --no-prompt

      - name: Configure API container app
        shell: bash
        run: |
          resource_group="${AZURE_RESOURCE_GROUP}"
          api_app_name="$(azd env get-value SERVICE_API_NAME 2>/dev/null)"
          web_url="$(azd env get-value REACT_APP_WEB_BASE_URL 2>/dev/null || true)"

          env_vars=("COOKIE_SECURE=true" "PODCAST_PROVIDER=azure")
          env_vars+=("AZURE_OPENAI_ENDPOINT=https://freshbite-openai-dev.openai.azure.com/")
          env_vars+=("AZURE_OPENAI_DEPLOYMENT_NAME=gpt-4o")
          env_vars+=("AZURE_SPEECH_REGION=westus3")
          env_vars+=("AZURE_SPEECH_RESOURCE_ID=/subscriptions/ac866176-3fcf-43c6-817a-6309be256398/resourceGroups/crgar-ai-rg/providers/Microsoft.CognitiveServices/accounts/crgar-podcast-speech")
          env_vars+=("SEED_ADMIN_USERNAME=admin")
          env_vars+=("SEED_ADMIN_PASSWORD=PodCraft2026!")
          env_vars+=("REGISTRATION_ENABLED=false")
          if [[ -n "${web_url}" ]]; then
            env_vars+=("ALLOWED_ORIGINS=${web_url}")
          fi

          az containerapp update \
            --resource-group "${resource_group}" \
            --name "${api_app_name}" \
            --set-env-vars "${env_vars[@]}" \
            --only-show-errors >/dev/null

      - name: Capture deployment outputs
        id: capture_outputs
        shell: bash
        run: |
          read_env_value() {
            local key="$1"
            local line
            line="$(azd env get-values | grep -m1 "^${key}=" || true)"
            if [[ -n "${line}" ]]; then
              echo "${line#*=}" | sed -e 's/^"//' -e 's/"$//'
            fi
          }

          resolve_container_app_url() {
            local app_name="$1"
            local fqdn
            if [[ -z "${app_name}" ]]; then return 0; fi
            fqdn="$(az containerapp show \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --name "${app_name}" \
              --query "properties.configuration.ingress.fqdn" \
              -o tsv 2>/dev/null || true)"
            if [[ -n "${fqdn}" ]]; then echo "https://${fqdn}"; fi
          }

          web_url="$(read_env_value REACT_APP_WEB_BASE_URL)"
          if [[ -z "${web_url}" ]]; then
            web_url="$(resolve_container_app_url "${WEB_CONTAINER_APP_NAME}")"
          fi

          api_url="$(read_env_value API_BASE_URL)"
          if [[ -z "${api_url}" ]]; then
            api_url="$(resolve_container_app_url "${API_CONTAINER_APP_NAME}")"
          fi

          echo "web_url=${web_url}" >> "${GITHUB_OUTPUT}"
          echo "api_url=${api_url}" >> "${GITHUB_OUTPUT}"
          echo "Web: ${web_url}"
          echo "API: ${api_url}"

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.outputs.web_url != ''
    steps:
      - uses: actions/checkout@v4

      - name: Run health checks
        run: |
          for i in {1..30}; do
            if curl -fsS "${{ needs.deploy.outputs.web_url }}/" > /dev/null 2>&1 \
              && curl -fsS "${{ needs.deploy.outputs.api_url }}/health" > /dev/null 2>&1; then
              echo "Health checks passed"
              exit 0
            fi
            echo "Attempt $i: waiting..."
            sleep 10
          done
          echo "Health checks failed after 30 attempts"
          exit 1
