name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # These are identifiers, not secrets. Security is provided by the OIDC
  # federated credential trust between this repo and the Azure AD app.
  AZURE_CLIENT_ID: "03c67cc0-a116-4474-b4ad-4da80cf78a3a"
  AZURE_TENANT_ID: "f75dc6d8-f0ea-4a54-9d3c-622e4aef8eb3"
  AZURE_SUBSCRIPTION_ID: "ac866176-3fcf-43c6-817a-6309be256398"
  AZURE_ENV_NAME: "crgar-podcast-prod"
  AZURE_LOCATION: "westus3"
  AZURE_RESOURCE_GROUP: "crgar-podcast-rg"
  AKS_CLUSTER_NAME: "crgar-podcast-aks"
  AZURE_AKS_CLUSTER_NAME: "crgar-podcast-aks"
  AKS_NODE_RESOURCE_GROUP_NAME: "crgar-podcast-node-rg"
  CONTAINER_REGISTRY_NAME: "crgarpodcastacr"
  LOG_ANALYTICS_WORKSPACE_NAME: "crgar-podcast-law"
  APPLICATION_INSIGHTS_NAME: "crgar-podcast-appi"
  API_IDENTITY_NAME: "crgar-podcast-api-mi"
  SEED_ADMIN_USERNAME: "admin"
  AZURE_OPENAI_ENDPOINT: "https://freshbite-openai-dev.openai.azure.com/"
  AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4o"
  AZURE_OPENAI_API_VERSION: "2024-10-21"
  AZURE_SPEECH_REGION: "westus3"
  AZURE_SPEECH_RESOURCE_ID: "/subscriptions/ac866176-3fcf-43c6-817a-6309be256398/resourceGroups/crgar-ai-rg/providers/Microsoft.CognitiveServices/accounts/crgar-podcast-speech"
  PODCAST_HOST_VOICE: "en-US-JennyNeural"
  PODCAST_GUEST_VOICE: "en-US-GuyNeural"

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.capture_outputs.outputs.api_url }}
      web_url: ${{ steps.capture_outputs.outputs.web_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure CLI (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in with Azure Developer CLI (Federated Credentials)
        run: |
          azd auth login `
            --client-id "${{ env.AZURE_CLIENT_ID }}" `
            --federated-credential-provider "github" `
            --tenant-id "${{ env.AZURE_TENANT_ID }}"
        shell: pwsh

      - name: Ensure azd environment
        shell: bash
        run: |
          set -euo pipefail

          if ! azd env select "${AZURE_ENV_NAME}" >/dev/null 2>&1; then
            azd env new "${AZURE_ENV_NAME}" --no-prompt
          fi

          azd env set AZURE_LOCATION "${AZURE_LOCATION}"
          azd env set AZURE_SUBSCRIPTION_ID "${AZURE_SUBSCRIPTION_ID}"
          azd env set AZURE_RESOURCE_GROUP "${AZURE_RESOURCE_GROUP}"
          azd env set AKS_CLUSTER_NAME "${AKS_CLUSTER_NAME}"
          azd env set AZURE_AKS_CLUSTER_NAME "${AZURE_AKS_CLUSTER_NAME}"
          azd env set AKS_NODE_RESOURCE_GROUP_NAME "${AKS_NODE_RESOURCE_GROUP_NAME}"
          azd env set CONTAINER_REGISTRY_NAME "${CONTAINER_REGISTRY_NAME}"
          azd env set LOG_ANALYTICS_WORKSPACE_NAME "${LOG_ANALYTICS_WORKSPACE_NAME}"
          azd env set APPLICATION_INSIGHTS_NAME "${APPLICATION_INSIGHTS_NAME}"
          azd env set API_IDENTITY_NAME "${API_IDENTITY_NAME}"

      - name: Ensure AKS SSH key
        shell: bash
        run: |
          set -euo pipefail

          ssh_key=""
          existing_cluster_key="$(az aks show \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AKS_CLUSTER_NAME}" \
            --query "linuxProfile.ssh.publicKeys[0].keyData" \
            -o tsv 2>/dev/null || true)"

          if [[ -n "${existing_cluster_key}" && "${existing_cluster_key}" != "null" ]]; then
            ssh_key="${existing_cluster_key}"
          fi

          if [[ -z "${ssh_key}" ]]; then
            for candidate in "$HOME/.ssh/id_rsa.pub" "$HOME/.ssh/id_ed25519.pub"; do
              if [[ -f "${candidate}" ]]; then
                ssh_key="$(tr -d '\r\n' < "${candidate}")"
                break
              fi
            done
          fi

          if [[ -z "${ssh_key}" ]]; then
            key_path="$HOME/.ssh/azd_aks"
            mkdir -p "$HOME/.ssh"
            ssh-keygen -t rsa -b 4096 -N "" -f "${key_path}" >/dev/null
            ssh_key="$(tr -d '\r\n' < "${key_path}.pub")"
          fi

          echo "AKS_SSH_PUBLIC_KEY=${ssh_key}" >> "${GITHUB_ENV}"
          azd env select "${AZURE_ENV_NAME}"
          azd env set AKS_SSH_PUBLIC_KEY "${ssh_key}"
          azd env config set infra.parameters.aksSshPublicKey "${ssh_key}"

      - name: Provision infrastructure
        shell: bash
        run: |
          set -euo pipefail
          azd env select "${AZURE_ENV_NAME}"
          azd provision --no-prompt

      - name: Deploy application
        shell: bash
        run: |
          set -euo pipefail
          azd env select "${AZURE_ENV_NAME}"
          azd deploy --no-prompt

      - name: Configure API deployment
        shell: bash
        env:
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -n "${SEED_ADMIN_PASSWORD:-}" ]]; then
            export REGISTRATION_ENABLED="false"
          else
            export REGISTRATION_ENABLED="true"
          fi

          bash ./infra/scripts/configure-api-aks.sh

      - name: Capture deployment outputs
        id: capture_outputs
        shell: bash
        run: |
          set -euo pipefail

          namespace="$(azd env get-value AKS_NAMESPACE 2>/dev/null || true)"
          namespace="${namespace:-azure-podcast-generator}"

          read_env_value() {
            azd env get-value "$1" 2>/dev/null || true
          }

          resolve_ingress_url() {
            local ingress_name="$1"
            local suffix="$2"
            local address=""

            for _ in {1..30}; do
              address="$(kubectl get ingress "${ingress_name}" -n "${namespace}" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
              if [[ -z "${address}" ]]; then
                address="$(kubectl get ingress "${ingress_name}" -n "${namespace}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
              fi

              if [[ -n "${address}" ]]; then
                echo "http://${address}${suffix}"
                return 0
              fi

              sleep 10
            done

            return 1
          }

          web_url="$(read_env_value SERVICE_WEB_ENDPOINT_URL)"
          if [[ -z "${web_url}" ]]; then
            web_url="$(resolve_ingress_url web "")"
          fi

          api_url="$(read_env_value SERVICE_API_ENDPOINT_URL)"
          if [[ -z "${api_url}" ]]; then
            api_url="$(resolve_ingress_url api "/api")"
          fi

          echo "web_url=${web_url}" >> "${GITHUB_OUTPUT}"
          echo "api_url=${api_url}" >> "${GITHUB_OUTPUT}"
          echo "Web: ${web_url}"
          echo "API: ${api_url}"

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.outputs.web_url != ''
    steps:
      - name: Run health checks
        run: |
          set -euo pipefail

          for i in {1..30}; do
            if curl -fsS "${{ needs.deploy.outputs.web_url }}/" > /dev/null 2>&1 \
              && curl -fsS "${{ needs.deploy.outputs.api_url }}/health" > /dev/null 2>&1; then
              echo "Health checks passed"
              exit 0
            fi

            echo "Attempt $i: waiting..."
            sleep 10
          done

          echo "Health checks failed after 30 attempts"
          exit 1
