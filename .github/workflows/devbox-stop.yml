name: Stop Devbox

# Deactivates the current devbox revision to pause compute billing.
# Image stays in ACR; state is lost (ephemeral FS). Start again with
# the "Start Devbox" workflow.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: "03c67cc0-a116-4474-b4ad-4da80cf78a3a"
  AZURE_TENANT_ID: "f75dc6d8-f0ea-4a54-9d3c-622e4aef8eb3"
  AZURE_SUBSCRIPTION_ID: "ac866176-3fcf-43c6-817a-6309be256398"
  AZURE_RESOURCE_GROUP: "crgar-podcast-rg"
  DEVBOX_CONTAINER_APP_NAME: "crgar-podcast-devbox"

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - name: Log in with Azure CLI (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deactivate active revision
        shell: bash
        run: |
          set -euo pipefail
          REVISION="$(az containerapp revision list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${DEVBOX_CONTAINER_APP_NAME}" \
            --query "[?properties.active].name | [0]" \
            -o tsv)"

          if [[ -z "${REVISION}" || "${REVISION}" == "None" ]]; then
            echo "No active revision found — nothing to stop."
            exit 0
          fi

          echo "Deactivating revision: ${REVISION}"
          az containerapp revision deactivate \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${DEVBOX_CONTAINER_APP_NAME}" \
            --revision "${REVISION}" \
            --only-show-errors

          echo "Devbox stopped. Compute billing paused."
