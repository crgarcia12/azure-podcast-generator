apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: devbox-workspace
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devbox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: devbox
  template:
    metadata:
      labels:
        app: devbox
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
      containers:
        - name: devbox
          image: "${SERVICE_DEVBOX_IMAGE_NAME}"
          imagePullPolicy: IfNotPresent
          stdin: true
          tty: true
          env:
            - name: AKS_NAMESPACE
              value: "azure-podcast-generator"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - test -d /workspace
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: devbox-workspace
